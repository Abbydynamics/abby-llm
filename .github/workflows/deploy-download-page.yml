name: Deploy Download Page

# Публикует страницу скачивания (GitHub Pages), которая сама подтягивает
# последний установщик из Releases. Требуется один раз включить Pages:
# Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp artifacts/abby-llm/download-page/index.html _site/index.html
          cp artifacts/abby-llm/src/assets/abby-logo.png _site/abby-logo.png
          cp artifacts/abby-llm/src/assets/abby-brain.png _site/abby-brain.png
          sed -i "s#__REPO__#${{ github.repository }}#g" _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
