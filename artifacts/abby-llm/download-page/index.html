<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Abby LLM — скачать</title>
  <meta name="description" content="Abby LLM — твоя собственная языковая модель. Десктоп-приложение для Windows." />
  <style>
    :root {
      --violet: 262 83% 68%;
      --magenta: 300 80% 65%;
      --blue: 230 80% 66%;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: hsl(255 25% 92%);
      background: hsl(252 40% 6%);
      background-image:
        radial-gradient(60% 50% at 20% 0%, hsl(262 83% 30% / 0.45), transparent 60%),
        radial-gradient(50% 50% at 100% 30%, hsl(300 80% 35% / 0.30), transparent 55%),
        radial-gradient(50% 60% at 50% 110%, hsl(230 80% 35% / 0.30), transparent 60%);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }
    .card {
      width: 100%;
      max-width: 540px;
      padding: 40px 36px;
      border-radius: 28px;
      text-align: center;
      background: linear-gradient(135deg, hsl(255 60% 80% / 0.10), hsl(255 60% 60% / 0.03));
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      border: 1px solid hsl(0 0% 100% / 0.10);
      box-shadow: 0 24px 80px hsl(255 60% 4% / 0.6), inset 0 1px 0 hsl(0 0% 100% / 0.12);
    }
    .logo {
      width: 92px; height: 92px; object-fit: contain;
      margin: 0 auto 18px;
      filter: drop-shadow(0 8px 24px hsl(var(--violet) / 0.5));
    }
    h1 {
      font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, hsl(var(--violet)), hsl(var(--magenta)));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin-bottom: 8px;
    }
    .tagline { color: hsl(255 15% 70%); font-size: 14.5px; line-height: 1.55; margin-bottom: 28px; }
    .download {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 700; color: #fff; text-decoration: none;
      padding: 15px 30px; border-radius: 16px; cursor: pointer; border: none;
      background: linear-gradient(135deg, hsl(var(--violet)), hsl(var(--magenta)));
      box-shadow: 0 10px 30px hsl(var(--violet) / 0.45), inset 0 1px 0 hsl(0 0% 100% / 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }
    .download:hover { transform: translateY(-2px); box-shadow: 0 16px 40px hsl(var(--violet) / 0.55), inset 0 1px 0 hsl(0 0% 100% / 0.25); }
    .download[aria-disabled="true"] { opacity: 0.45; pointer-events: none; }
    .meta { margin-top: 16px; font-size: 12.5px; color: hsl(255 12% 60%); min-height: 18px; }
    .req {
      margin-top: 28px; padding-top: 20px;
      border-top: 1px solid hsl(0 0% 100% / 0.08);
      font-size: 12.5px; color: hsl(255 12% 62%); line-height: 1.6;
    }
    .req b { color: hsl(255 20% 82%); font-weight: 600; }
    .links { margin-top: 14px; font-size: 12.5px; }
    .links a { color: hsl(var(--violet) / 1); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .brain {
      position: fixed; right: -80px; bottom: -80px; width: 320px; opacity: 0.18;
      pointer-events: none; filter: blur(1px);
    }
    @media (max-width: 560px) { .card { padding: 32px 22px; } h1 { font-size: 25px; } }
  </style>
</head>
<body>
  <img class="brain" src="abby-brain.png" alt="" aria-hidden="true" />
  <main class="card">
    <img class="logo" src="abby-logo.png" alt="Abby LLM" />
    <h1>Abby LLM</h1>
    <p class="tagline">Твоя собственная языковая модель.<br />Обучается на твоих файлах и работает офлайн — без Ollama и внешних API.</p>

    <a id="dl" class="download" aria-disabled="true" href="#">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="dl-text">Загрузка…</span>
    </a>
    <div class="meta" id="meta"></div>

    <div class="req">
      <b>Системные требования:</b> Windows 10 / 11, 64-bit.<br />
      Установщик NSIS — выбор папки, ярлыки на рабочем столе и в меню «Пуск».
    </div>
    <div class="links">
      <a id="all-releases" href="#" target="_blank" rel="noopener">Все версии и другие платформы →</a>
    </div>
  </main>

  <script>
    const REPO = "__REPO__";
    const dl = document.getElementById("dl");
    const dlText = document.getElementById("dl-text");
    const meta = document.getElementById("meta");
    document.getElementById("all-releases").href = `https://github.com/${REPO}/releases`;

    function fmtSize(bytes) {
      if (!bytes) return "";
      const mb = bytes / (1024 * 1024);
      return mb >= 1024 ? (mb / 1024).toFixed(2) + " ГБ" : mb.toFixed(1) + " МБ";
    }
    function fmtDate(iso) {
      try { return new Date(iso).toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" }); }
      catch { return ""; }
    }

    fetch(`https://api.github.com/repos/${REPO}/releases/latest`, { headers: { Accept: "application/vnd.github+json" } })
      .then((r) => { if (!r.ok) throw new Error(String(r.status)); return r.json(); })
      .then((rel) => {
        const asset = (rel.assets || []).find((a) => a.name.toLowerCase().endsWith(".exe"));
        if (!asset) throw new Error("no-asset");
        dl.href = asset.browser_download_url;
        dl.setAttribute("download", asset.name);
        dl.setAttribute("aria-disabled", "false");
        dlText.textContent = "Скачать для Windows";
        const parts = [];
        if (rel.tag_name) parts.push(rel.tag_name);
        if (asset.size) parts.push(fmtSize(asset.size));
        if (rel.published_at) parts.push(fmtDate(rel.published_at));
        meta.textContent = parts.join("  ·  ");
      })
      .catch((err) => {
        dlText.textContent = "Сборка ещё не готова";
        meta.innerHTML = `Установщик появится здесь после первой сборки. <a style="color:inherit;text-decoration:underline" href="https://github.com/${REPO}/releases">Открыть Releases</a>`;
      });
  </script>
</body>
</html>
